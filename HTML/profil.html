<!DOCTYPE html>

<html lang="hu">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BandShelf</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../CSS/profil.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark fixed-top">

<div class="container-fluid">

<button class="navbar-toggler"
type="button"
data-bs-toggle="offcanvas"
data-bs-target="#sidebarMenu">

<span class="navbar-toggler-icon"></span>

</button>

<a class="navbar-brand ms-2">BandShelf</a>

<form class="d-flex ms-3 me-auto">

<input class="form-control form-control-sm me-2"
type="search"
placeholder="Keresés">

<button class="btn btn-outline-light btn-sm">
Keres
</button>

</form>


<div class="dropdown ms-auto d-flex align-items-center">

<img id="navProfileImage"
src="https://via.placeholder.com/35"
class="rounded-circle"
width="35"
height="35">

<a href="#"
class="text-white text-decoration-none dropdown-toggle ms-2"
data-bs-toggle="dropdown">

<span id="navProfileName">Vendég</span>

</a>

<ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">

<li>
<a class="dropdown-item" onclick="showSection('profile')">
<i class="bi bi-person me-2"></i>
Profilom
</a>
</li>

<li>
<a class="dropdown-item" onclick="showSection('favorites')">
<i class="bi bi-star me-2"></i>
Kedvencek
</a>
</li>

<li>
<hr class="dropdown-divider">
</li>

<!-- LOGIN -->
<li id="loginMenuItem">
<button class="dropdown-item text-success" onclick="goLogin()">
<i class="bi bi-box-arrow-in-right me-2"></i>
Bejelentkezés
</button>
</li>

<!-- LOGOUT -->
<li id="logoutMenuItem">
<button class="dropdown-item text-danger" onclick="logout()">
<i class="bi bi-box-arrow-right me-2"></i>
Kijelentkezés
</button>
</li>


</ul>

</div>

</div>

</nav>

<!-- SIDEBAR -->

<div class="offcanvas offcanvas-start text-bg-dark"
tabindex="-1"
id="sidebarMenu">

<div class="offcanvas-header">

<h5 class="offcanvas-title">Menü</h5>

<button type="button"
class="btn-close btn-close-white"
data-bs-dismiss="offcanvas"> </button>

</div>

<div class="offcanvas-body">

<ul class="navbar-nav">

<li class="nav-item">
<a class="nav-link" href="../HTML/index.html">
<i class="bi bi-house me-2"></i>
Főoldal
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="../HTML/members.html">
<i class="bi bi-people me-2"></i>
Stray Kids
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="../HTML/LinkinPark.html">
<i class="bi bi-music-note me-2"></i>
Linkin Park
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="../HTML/MyChemicalRomance.html">
<i class="bi bi-music-note me-2"></i>
My Chemical Romance
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="../RHTML/rmembers.html">
<i class="bi bi-music-note me-2"></i>
Bad Omens
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="../HTML/albumok.html">
<i class="bi bi-disc me-2"></i>
Albumok
</a>
</li>

</ul>

</div>

</div>

<!-- FŐ TARTALOM -->

<div class="container main-content">

<!-- PROFIL -->

<div id="profile" class="section active">

<div class="card bg-dark text-white p-4">

<div class="text-center">

<div id="dropArea" class="profile-upload">

<img id="profileImage"
src="https://via.placeholder.com/150"
class="profile-img">

<p class="mt-2">Húzd ide a képet vagy kattints</p>

<input type="file"
id="imageUpload"
accept="image/*"
hidden>

</div>

<h3 id="profileName">Vendég</h3>

</div>

<div class="mt-4">

<label class="form-label">Név módosítása</label>

<input type="text"
class="form-control"
id="nameInput"
placeholder="Új név">

<button class="btn btn-outline-light mt-3 w-100"
onclick="changeName()">

Mentés

</button>

</div>

<!-- LOGIN GOMB -->
<button id="loginBtn"
class="btn btn-success mt-3 w-100"
onclick="goLogin()">
<i class="bi bi-box-arrow-in-right me-2"></i>
Bejelentkezés
</button>

</div>

</div>

<!-- KEDVENCEK -->

<div id="favorites" class="section">

<h3>Kedvenc zenekarok</h3>

<div class="input-group mt-3">

<input type="text"
class="form-control"
id="favoriteInput"
placeholder="Zenekar hozzáadása">

<button class="btn btn-dark"
onclick="addFavorite()">

Hozzáadás

</button>

</div>

<ul id="favoritesList"
class="list-group mt-3">

</ul>

</div>

</div>

<script src="../JS/profil.js"></script>
<script>
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "../HTML/login.html";
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
