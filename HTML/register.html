<!DOCTYPE html>
<html lang="hu">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../CSS/register.css">
<title>Regisztráció</title>

</head>

<body>

<div class="register-box">

<h2>Regisztráció</h2>

<form id="registerForm">

<input type="text" id="username" placeholder="Felhasználónév" required>

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Jelszó" required>

<input type="password" id="passwordConfirm" placeholder="Jelszó megerősítése" required>

<button type="submit">Regisztráció</button>

</form>

<p id="message"></p>

</div>

<script src="../JS/register.js"></script>

</body>
</html>
